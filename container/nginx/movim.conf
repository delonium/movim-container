# Picture proxy cache
fastcgi_cache_path /var/cache/picture_proxy levels=1:2 keys_zone=nginx_cache:100m inactive=60m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {
    include snippets/${CONTAINER_MODE}.conf;

    server_name _;

    http2 on;

    # Where Movim public directory is setup
    root /var/www/movim/public;

    index index.php;

    # Ask nginx to cache every URL starting with "/picture"
    location /picture {
        set $no_cache 0; # Enable cache only there
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location / {
        set $no_cache 1;
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        add_header X-Cache $upstream_cache_status;
        fastcgi_ignore_headers "Cache-Control" "Expires" "Set-Cookie";
        fastcgi_cache nginx_cache;
        fastcgi_cache_valid any 7d;
        fastcgi_cache_bypass $no_cache;
        fastcgi_no_cache $no_cache;
        fastcgi_pass unix:/run/php/movim-fpm.sock;

        include snippets/fastcgi-php.conf;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_redirect off;
    }
}
