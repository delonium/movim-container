name: Build Upstream Release
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Check latest upstream release
        id: get-version
        run: |
          TAG=$(curl -sL "https://api.github.com/repos/movim/movim/releases/latest" | jq -r '.tag_name // empty')
          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Check if already built
        id: check-tag
        run: |
          git fetch --tags
          if [[ -n "$(git tag -l ${{ steps.get-version.outputs.version }})" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create version tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git tag ${{ steps.get-version.outputs.version }}
          git push origin ${{ steps.get-version.outputs.version }}

  build:
    needs: detect-release
    if: needs.detect-release.outputs.version != ''
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      push: true
      output: image
      platforms: linux/amd64
      context: .
      file: Containerfile
      build-args: |
        MOVIM_TAG=${{ needs.detect-release.outputs.version }}
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=raw,value=${{ needs.detect-release.outputs.version }}
        type=semver,pattern={{version}}
        type=raw,value=latest
      meta-flavor: |
        latest=false
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
