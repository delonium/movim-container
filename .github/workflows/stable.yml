name: Build Stable Release

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      build-revision:
        description: Rebuild and publish revision with latest container image.
        required: false
        type: boolean
        default: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      release-name: ${{ steps.get-version.outputs.name }}
      should-build: ${{ steps.check-tag.outputs.should-build }}
      revision-tag: ${{ steps.check-tag.outputs.revision-tag }}
      revision-number: ${{ steps.check-tag.outputs.revision-number }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true

      - name: Get latest Movim stable release
        id: get-version
        run: |
          RELEASE_JSON=$(curl -sL "https://api.github.com/repos/movim/movim/releases/latest")
          
          TAG=$(jq -r '.tag_name // empty' <<<${RELEASE_JSON})
          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"

          NAME=$(jq -r '.name // empty' <<<${RELEASE_JSON})
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"

      - name: Determine if container should be built and handle revisions
        id: check-tag
        env:
          BUILD_REVISION: ${{ inputs.build-revision }}
          MOVIM_TAG: ${{ steps.get-version.outputs.version }}
        run: |
          if [[ -z "$(git tag -l ${{ steps.get-version.outputs.version }})" ]]; then
            echo "should-build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          else
            # Only handle building a revision if the stable release was built at least once.
            if ${BUILD_REVISION}; then
              LATEST_REVISION_TAG=$(git tag -l "${MOVIM_TAG}-rev*" | sort -V | tail -1)
              REVISION=$(($(git tag -l "${MOVIM_TAG}-rev*" | wc -l) + 1))

              # Build a revision only if either:
              # 1) There is no revision tag for the latest stable Movim release.
              # or
              # 2) There is a revision tag and it is not HEAD (already latest).
              if [[ -n "${LATEST_REVISION_TAG}" ]]; then
                TAG_SHA=$(git rev-list -n 1 ${LATEST_REVISION_TAG})
                HEAD_SHA=$(git rev-parse HEAD)

                if [[ "${TAG_SHA}" != "${HEAD_SHA}" ]]; then
                  echo "should-build=true" >> "${GITHUB_OUTPUT}"
                  echo "revision-tag=${MOVIM_TAG}-rev${REVISION}" >> "${GITHUB_OUTPUT}"
                  echo "revision-number=${REVISION}" >> "${GITHUB_OUTPUT}"
                  exit 0
                fi
              else
                echo "should-build=true" >> "${GITHUB_OUTPUT}"
                echo "revision-tag=${MOVIM_TAG}-rev${REVISION}" >> "${GITHUB_OUTPUT}"
                echo "revision-number=${REVISION}" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            fi
          fi

          echo "should-build=false" >> ${GITHUB_OUTPUT}

  build-and-publish:
    needs: check-release
    if: needs.check-release.outputs.should-build == 'true'
    uses: ./.github/workflows/build-container.yml
    permissions:
      contents: read
      packages: write
      #id-token: write
    with:
      movim-tag: ${{ needs.check-release.outputs.version }}
      publish: true

  release:
    needs: [check-release, build-and-publish]
    if: needs.check-release.outputs.should-build == 'true' && needs.build-and-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true

      - name: Tag repository
        id: tag-repo
        env:
          REVISION_TAG: ${{ needs.check-release.outputs.revision-tag }}
          REVISION_NUM: ${{ needs.check-release.outputs.revision-number }}
          MOVIM_TAG: ${{ needs.check-release.outputs.version }}
          RELEASE_NAME: ${{ needs.check-release.outputs.release-name }}
        run: |
          if [[ -n "${REVISION_TAG}" ]]; then
            REPO_TAG=${REVISION_TAG}
            echo "release-name=${RELEASE_NAME} Revision ${REVISION_NUM}" >> "${GITHUB_OUTPUT}"
          else
            REPO_TAG=${MOVIM_TAG}
            echo "release-name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          fi

          git tag ${REPO_TAG}
          git push origin tag ${REPO_TAG}

          echo "release-tag=${REPO_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Make release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.tag-repo.outputs.release-name }}
          tag_name: ${{ steps.tag-repo.outputs.release-tag }}
          generate_release_notes: true
          append_body: true
          body: |
            **Movim release notes**: [${{ needs.check-release.outputs.version }}](https://github.com/movim/movim/releases/tag/${{ needs.check-release.outputs.version }}).
