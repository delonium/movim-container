name: Build Stable Release

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-build: ${{ steps.check-tag.outputs.should-build }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true

      - name: Get latest Movim stable release
        id: get-version
        run: |
          TAG=$(curl -sL "https://api.github.com/repos/movim/movim/releases/latest" | jq -r '.tag_name // empty')
          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Check if already built
        id: check-tag
        run: |
          if [[ -z "$(git tag -l ${{ steps.get-version.outputs.version }})" ]]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    needs: check-release
    if: needs.check-release.outputs.should-build == 'true'
    uses: ./.github/workflows/build-container.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      movim-tag: ${{ needs.check-release.outputs.version }}
      publish: true

  tag-repo:
    needs: [check-release, build-and-publish]
    if: needs.check-release.outputs.should-build == 'true' && needs.build-and-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
          fetch-depth: 0

      - env:
          MOVIM_TAG: ${{ needs.check-release.outputs.version }}
        run: |
          git tag -a ${MOVIM_TAG} -m "Stable build for Movim ${MOVIM_TAG}."
          git push origin tag ${MOVIM_TAG}
